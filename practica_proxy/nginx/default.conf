# Cache en un lugar donde Nginx siempre tiene permiso
proxy_cache_path /tmp/cache levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=60m use_temp_path=off;

upstream backends {
    server apache1:80;
    server apache2:80;
}

server {
    listen 80;

    location / {
        proxy_pass http://backends;
        
        # Cabeceras de prueba
        add_header X-Backend-Server $upstream_addr;
        add_header X-Cache-Status $upstream_cache_status;

        # Configuración de caché indestructible
        proxy_cache my_cache;
        proxy_cache_key "$scheme$proxy_host$request_uri";
        proxy_cache_valid 200 60m;
        
        # Forzar caché ignorando todo lo que digan Apache o el Navegador
        proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
        proxy_hide_header Set-Cookie;
        proxy_buffering on;
    }
}
