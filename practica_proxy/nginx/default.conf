# Configuració de la memòria cau
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=60m use_temp_path=off;

upstream backends {
    # Round Robin és el mètode per defecte
    server apache1:80;
    server apache2:80;
}

server {
    listen 80;

    location / {
        proxy_pass http://backends;
        
        # Cabeceres per a depuració (molt útils per a les captures)
        add_header X-Backend-Server $upstream_addr;
        add_header X-Cache-Status $upstream_cache_status;

        # Configuració de la memòria cau
        proxy_cache my_cache;
        proxy_cache_valid 200 302 10m;
        proxy_cache_valid 404      1m;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        
        # Forçar que s'ignorin els headers de control de cache de l'apache per provar-ho fàcilment
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
    }
}
